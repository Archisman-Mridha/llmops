apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/instance: nv-sentinel
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: syslog-health-monitor
    app.kubernetes.io/version: 1.16.0
    helm.sh/chart: syslog-health-monitor-0.1.0
  name: syslog-health-monitor-kata
  namespace: nv-sentinel
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: nv-sentinel
      app.kubernetes.io/name: syslog-health-monitor
      nvsentinel.dgxc.nvidia.com/kata: "true"
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: nv-sentinel
        app.kubernetes.io/name: syslog-health-monitor
        nvsentinel.dgxc.nvidia.com/kata: "true"
    spec:
      containers:
      - args:
        - --polling-interval
        - 15s
        - --metrics-port
        - "2112"
        - --kata-enabled
        - "true"
        - --checks
        - SysLogsXIDError,SysLogsSXIDError,SysLogsGPUFallenOff
        - --metadata-path
        - /var/lib/nvsentinel/gpu_metadata.json
        - --processing-strategy
        - EXECUTE_REMEDIATION
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: LOG_LEVEL
          value: info
        image: ghcr.io/nvidia/nvsentinel/syslog-health-monitor:v1.0.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: 2112
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 3
        name: syslog-health-monitor
        ports:
        - containerPort: 2112
          name: metrics
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /metrics
            port: 2112
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          capabilities:
            add:
            - SYSLOG
            - SYS_ADMIN
          runAsUser: 0
        volumeMounts:
        - mountPath: /var/run/
          name: var-run-vol
        - mountPath: /var/run/syslog_health_monitor
          name: syslog-state-vol
        - mountPath: /var/lib/nvsentinel
          name: metadata-vol
          readOnly: true
        - mountPath: /nvsentinel/var/log/journal
          name: host-journal
          readOnly: true
        - mountPath: /run/systemd/journal
          name: host-systemd
          readOnly: true
        - mountPath: /etc/machine-id
          name: host-machine-id
          readOnly: true
        - mountPath: /nvsentinel/proc
          name: proc-vol
          readOnly: true
        - mountPath: /nvsentinel/sys
          name: sys-vol
          readOnly: true
      nodeSelector:
        nvsentinel.dgxc.nvidia.com/driver.installed: "true"
        nvsentinel.dgxc.nvidia.com/kata.enabled: "true"
      tolerations:
      - operator: Exists
      volumes:
      - hostPath:
          path: /var/run/nvsentinel
          type: DirectoryOrCreate
        name: var-run-vol
      - hostPath:
          path: /var/run/syslog_health_monitor
          type: DirectoryOrCreate
        name: syslog-state-vol
      - hostPath:
          path: /var/lib/nvsentinel
          type: DirectoryOrCreate
        name: metadata-vol
      - hostPath:
          path: /var/log/journal
          type: Directory
        name: host-journal
      - hostPath:
          path: /run/systemd/journal
          type: Directory
        name: host-systemd
      - hostPath:
          path: /etc/machine-id
          type: File
        name: host-machine-id
      - hostPath:
          path: /sys
          type: Directory
        name: sys-vol
      - hostPath:
          path: /proc
          type: Directory
        name: proc-vol
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 5%
    type: RollingUpdate
