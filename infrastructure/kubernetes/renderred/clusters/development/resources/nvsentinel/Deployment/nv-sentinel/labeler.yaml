apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/instance: nv-sentinel
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: labeler
    app.kubernetes.io/version: 1.16.0
    helm.sh/chart: labeler-0.1.0
  name: labeler
  namespace: nv-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: nv-sentinel
      app.kubernetes.io/name: labeler
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: nv-sentinel
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: labeler
        app.kubernetes.io/version: 1.16.0
        helm.sh/chart: labeler-0.1.0
    spec:
      containers:
      - args:
        - --metrics-port
        - "2112"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: LOG_LEVEL
          value: info
        image: ghcr.io/nvidia/nvsentinel/labeler:v1.0.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: metrics
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        name: labeler
        ports:
        - containerPort: 2112
          name: metrics
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
      serviceAccountName: labeler
